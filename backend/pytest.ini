[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    auth: Authentication and authorization tests
    connection: Connection management tests
    monitoring: Performance monitoring tests
    slow_query: Slow query analysis tests
    explain: EXPLAIN analysis tests
    index: Index management tests
    table: Table structure tests
    alert: Alert management tests
    report: Performance report tests
    unit: Unit tests
    integration: Integration tests
    api: API endpoint tests

[coverage:run]
branch = main
source = app
omit =
    app/main.py
    app/database.py
    app/config.py
    tests/*
    */migrations/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
